services:
  postgres:
    image: postgres:16-alpine
    container_name: machinetwin-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-machinetwin}
      POSTGRES_USER: ${POSTGRES_USER:-machinetwin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-machinetwin}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - machinetwin_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-machinetwin} -d ${POSTGRES_DB:-machinetwin}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  machinetwin_postgres_data:
